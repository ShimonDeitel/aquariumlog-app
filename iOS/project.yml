name: AquariumLog
options:
  bundleIdPrefix: com.shimondeitel.aquariumlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AquariumLog:
    type: application
    platform: iOS
    sources:
      - path: AquariumLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquariumlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AquariumLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AquariumLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AquariumLogTests
      - path: AquariumLog.storekit
    dependencies:
      - target: AquariumLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquariumlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AquariumLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AquariumLogUITests
    dependencies:
      - target: AquariumLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.aquariumlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AquariumLog:
    build:
      targets:
        AquariumLog: all
        AquariumLogTests: [test]
        AquariumLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AquariumLog.storekit
    test:
      config: Debug
      storeKitConfiguration: AquariumLog.storekit
      targets:
        - AquariumLogTests
        - AquariumLogUITests
    archive:
      config: Release
